<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="connect.css">
  <style>
    .login-box { max-width: 400px; margin: 80px auto; background: #fff; border-radius: 18px; padding: 32px; border: 1px solid rgba(184,169,232,.22); box-shadow: 0 10px 40px rgba(100,80,150,.08); }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .login-box p { color: #8f86a3; font-size: 0.9rem; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 14px 16px; border: 1.5px solid rgba(184,169,232,.3); border-radius: 12px; font-size: 1rem; margin-bottom: 16px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #b8a9e8, #c9bdf0); color: #fff; font-weight: 600; font-size: 1rem; cursor: pointer; }
    .login-box button:disabled { opacity: 0.55; cursor: not-allowed; }
    .error { color: #c45a3a; font-size: 0.85rem; margin-top: 12px; min-height: 20px; }
    .hint { color: #6b5f8a; font-size: 0.85rem; margin-top: 16px; line-height: 1.6; }
    .hint a { color: #7c6bc4; font-weight: 600; }
    .team-link { display: inline-block; margin-top: 12px; padding: 12px 16px; border-radius: 12px; background: #ede8f8; color: #5c4d9a; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>팀 내부 로그인</h1>
    <p>광고 성과 대시보드 · 메타 · 유튜브 · 틱톡</p>
    <form id="login-form">
      <input type="password" id="password" placeholder="팀 비밀번호" autocomplete="current-password" required>
      <button type="submit" id="login-btn">로그인</button>
    </form>
    <p class="error" id="error"></p>
    <p class="hint" id="static-hint" hidden></p>
  </div>
  <script src="team-auth.js"></script>
  <script>
    const TEAM_LOGIN_URL = `${TEAM_APP_URL}/login.html`;
    const form = document.getElementById("login-form");
    const loginBtn = document.getElementById("login-btn");
    const err = document.getElementById("error");
    const hint = document.getElementById("static-hint");

    async function boot() {
      const apiOk = await isTeamApiAvailable();

      if (!apiOk) {
        hint.hidden = false;
        hint.innerHTML =
          `이 주소(GitHub Pages)에는 로그인 API가 없습니다.<br>` +
          `<a class="team-link" href="${TEAM_LOGIN_URL}">팀 대시보드 열기 (Railway)</a>`;
        form.querySelector("input").disabled = true;
        loginBtn.disabled = true;
        return;
      }

      if (getTeamToken()) {
        try {
          const res = await apiFetch("/api/campaigns");
          if (res.ok) {
            window.location.href = "ads.html";
            return;
          }
        } catch {
          clearTeamToken();
        }
      }

      const requiredRes = await fetchWithTimeout(`${API_BASE}/api/auth/required`, {}, 5000);
      if (requiredRes.ok) {
        const data = await requiredRes.json();
        if (!data.required) window.location.href = "ads.html";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      loginBtn.disabled = true;
      try {
        const res = await fetchWithTimeout(`${API_BASE}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("password").value }),
        }, 8000);
        let data = {};
        try {
          data = await res.json();
        } catch {
          throw new Error("서버 응답 오류. Railway 주소에서 다시 시도해 주세요.");
        }
        if (!res.ok) throw new Error(data.detail || "로그인 실패");
        setTeamToken(data.token);
        window.location.href = "ads.html";
      } catch (ex) {
        err.textContent = ex.message || "로그인에 실패했습니다.";
      } finally {
        loginBtn.disabled = false;
      }
    });

    boot();
  </script>
</body>
</html>
