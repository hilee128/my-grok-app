<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투두리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f9f8f6;
      padding: 40px 20px;
      color: #1a1a1a;
      min-height: 100dvh;
    }
    .page-wrap {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .header-icon {
      width: 44px;
      height: 44px;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0;
    }
    .header-subtitle {
      color: #888;
      font-size: 0.9rem;
      margin: 4px 0 20px;
    }
    .input-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .todo-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e5e3df;
      border-radius: 999px;
      font-size: 1rem;
      outline: none;
    }
    .add-btn {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: #1a1a1a;
      color: white;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #e5e3df;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .filter-btn.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 12px 16px;
      border-radius: 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .todo-item.done .title {
      text-decoration: line-through;
      color: #aaa;
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #ccc;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
    }
    .checkbox.checked {
      background: #6366f1;
      border-color: #6366f1;
      color: white;
    }
    .title {
      flex: 1;
      font-size: 0.95rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #888;
    }
    .clear-btn {
      background: none;
      border: 1px solid #ddd;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="header">
      <img src="todo-icon.png" alt="" class="header-icon" width="44" height="44">
      <h1>오늘의 할 일</h1>
    </div>
    <p class="header-subtitle">작은 일부터 차근차근 ✨</p>

    <form class="input-form" id="todo-form" onsubmit="return false;">
      <input type="text" id="todo-input" class="todo-input" placeholder="할 일을 입력하세요…" maxlength="120">
      <button type="submit" class="add-btn" aria-label="추가">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행 중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span class="count" id="count"></span>
      <button class="clear-btn" id="clear-completed">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let currentFilter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      list.innerHTML = '';

      let filtered = todos;
      if (currentFilter === 'active') filtered = todos.filter(t => !t.done);
      if (currentFilter === 'completed') filtered = todos.filter(t => t.done);

      filtered.forEach((todo, i) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');
        li.innerHTML = `
          <div class="checkbox ${todo.done ? 'checked' : ''}" onclick="toggle(${i})">${todo.done ? '✓' : ''}</div>
          <span class="title">${todo.text}</span>
          <button class="delete" onclick="remove(${i})">×</button>
        `;
        list.appendChild(li);
      });

      document.getElementById('count').textContent = `${todos.filter(t => !t.done).length}개 남음`;
    }

    function add() {
      const input = document.getElementById('todo-input');
      const val = input.value.trim();
      if (!val) return;
      todos.push({ text: val, done: false });
      save();
      input.value = '';
      render();
    }

    function toggle(i) {
      todos[i].done = !todos[i].done;
      save();
      render();
    }

    function remove(i) {
      todos.splice(i, 1);
      save();
      render();
    }

    function clearCompleted() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    // filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('todo-form').addEventListener('submit', e => {
      e.preventDefault();
      add();
    });

    document.getElementById('clear-completed').addEventListener('click', clearCompleted);

    // init
    render();
  </script>
</body>
</html>
