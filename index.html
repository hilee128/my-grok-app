<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>투두리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="nav.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">
    <nav class="top-nav">
      <span class="nav-current">투두리스트</span>
      <a href="ads.html" class="nav-link">광고 데모 (정적)</a>
      <a href="https://my-grok-app-production.up.railway.app/login.html" class="nav-link">팀 대시보드</a>
    </nav>
    <div class="app">
    <header class="header">
      <div class="header-title">
        <img src="todo-icon.png" alt="" class="header-icon" width="44" height="44">
        <h1>오늘의 할 일</h1>
      </div>
      <p class="header-subtitle">작은 일부터 차근차근 ✨</p>
    </header>

    <form class="input-form" id="todo-form" autocomplete="off">
      <input
        type="text"
        id="todo-input"
        class="todo-input"
        placeholder="할 일을 입력하세요…"
        maxlength="120"
        aria-label="새 할 일"
      >
      <button type="submit" class="add-btn" aria-label="추가">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <div class="filters" role="tablist" aria-label="필터">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">전체</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">진행 중</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">완료</button>
    </div>

    <ul class="todo-list" id="todo-list" aria-live="polite"></ul>

    <footer class="footer" id="footer" hidden>
      <span class="count" id="count"></span>
      <button class="clear-btn" id="clear-completed" type="button">완료 항목 삭제</button>
    </footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
